# ================================================
# CI Pipeline — TaskFlow (Laravel + Angular)
# ================================================
# Runs on:
#   - Push to develop or feature/* branches
#   - Pull Request to main or develop

name: CI Pipeline

on:
  push:
    branches:
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ──────────────────────────────────────────────
  # JOB 1 : Backend Laravel
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Récupérer le code
        uses: actions/checkout@v3

      # 2. Installer PHP
      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, bcmath, zip

      # 3. Installer les dépendances Laravel
      - name: Installer les dépendances
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      # 4. Configurer l'environnement
      - name: Configurer .env
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      # 5. Lancer les tests
      - name: Lancer les tests
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      # 6. Vérifier que le projet compile
      - name: Vérifier la compilation
        working-directory: backend
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan route:list --path=api

  # ──────────────────────────────────────────────
  # JOB 2 : Frontend Angular
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Récupérer le code
        uses: actions/checkout@v3

      # 2. Installer Node.js
      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Installer les dépendances Angular
      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      # 4. Vérifier les types TypeScript
      - name: Vérifier TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

      # 5. Compiler le projet Angular
      - name: Compiler Angular (production)
        working-directory: frontend
        run: npm run build -- --configuration production
