name: CI Pipeline

on:
  push:
    branches:
      - 'TASK-*'
      - main
  pull_request:
    branches:
      - main

jobs:
  # JOB 1 : Backend Laravel
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Récupérer le code
        uses: actions/checkout@v3

      # 2. Installer PHP 8.3
      - name: Installer PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, bcmath, zip

      # 3. Créer les dossiers nécessaires à Laravel
      - name: Créer les dossiers Laravel
        run: mkdir -p backend/bootstrap/cache backend/storage/logs

      # 4. Installer les dépendances Laravel
      - name: Installer les dépendances
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      # 5. Configurer l'environnement
      - name: Configurer .env
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      # 6. Lancer les tests (SQLite en mémoire configuré dans phpunit.xml)
      - name: Lancer les tests
        working-directory: backend
        run: php artisan test

      # 7. Vérifier les routes API
      - name: Vérifier les routes API
        working-directory: backend
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan route:list --path=api

  # JOB 2 : Frontend Angular
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Récupérer le code
        uses: actions/checkout@v3

      # 2. Installer Node.js 20
      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Installer les dépendances Angular
      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      # 4. Vérifier les types TypeScript
      - name: Vérifier TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

      # 5. Compiler le projet Angular
      - name: Compiler Angular
        working-directory: frontend
        run: npm run build