name: TaskFlow CI/CD Pipeline

on:
  push:
    branches: [ main, dev, 'TASK-*' ]
  pull_request:
    branches: [ main, dev ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Backend Laravel Tests
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend Laravel (PHP 8.3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, exif, pcntl, bcmath, gd, zip
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        working-directory: backend
        run: cp .env.example .env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run PHPUnit tests (SQLite in-memory)
        working-directory: backend
        run: php artisan test --env=testing
        # phpunit.xml configure déjà DB_CONNECTION=sqlite, DB_DATABASE=:memory:

  # ─────────────────────────────────────────
  # JOB 2 — Frontend Angular Build
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend Angular 17 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend
        run: npm run build -- --configuration production

  # ─────────────────────────────────────────
  # JOB 3 — Docker Compose Build
  # (seulement si les 2 jobs précédents passent)
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-build ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build --no-cache

      - name: Verify containers start correctly
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose down
